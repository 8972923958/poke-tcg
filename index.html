<!DOCTYPE html>
<html>
<head>
<title>Pokemon TCG Online</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f0f0f0;
}

button{
    padding:10px;
    margin:5px;
    font-size:18px;
}

.card{
    background:white;
    padding:15px;
    margin:10px auto;
    width:300px;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>Pokemon TCG Online</h1>

<h2 id="coins">Coins: 1000</h2>
<h2 id="level">Level: 1</h2>
<h2 id="xp">XP: 0</h2>

<button onclick="openPack()">Open Mega Evolution Pack (100 Coins)</button>

<h2>Collection</h2>

<div id="collection"></div>

<script>

/* PASTE THE NEW SCRIPT HERE */

let coins = localStorage.getItem("coins") || 1000;
let xp = localStorage.getItem("xp") || 0;
let level = localStorage.getItem("level") || 1;

let collection =
JSON.parse(localStorage.getItem("collection")) || [];

const packs = {
  "Mega Evolution": {
    price: 100,
    cards: [
      "Mega Lucario ex",
      "Mega Gardevoir ex",
      "Mega Venusaur ex",
      "Mega Latias ex"
    ]
  },

  "Scarlet & Violet": {
    price: 150,
    cards: [
      "Charizard ex",
      "Miraidon ex",
      "Koraidon ex",
      "Pikachu"
    ]
  }
};

function saveGame(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("collection", JSON.stringify(collection));
}

function updateStats(){
  document.getElementById("coins").innerHTML = "Coins: " + coins;
  document.getElementById("xp").innerHTML = "XP: " + xp;
  document.getElementById("level").innerHTML = "Level: " + level;
}

function showCollection(){
  let area = document.getElementById("collection");
  area.innerHTML = "";

  collection.forEach(card => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = card;
    area.appendChild(div);
  });
}

function gainXP(amount){
  xp = Number(xp) + amount;

  if(xp >= level * 100){
    xp = 0;
    level = Number(level) + 1;
    alert("Level Up! Level " + level);
  }
}

function openPack(packName){
  let pack = packs[packName];

  if(coins < pack.price){
    alert("Not enough coins!");
    return;
  }

  coins -= pack.price;

  let card =
  pack.cards[
    Math.floor(Math.random() * pack.cards.length)
  ];

  collection.push(card);

  gainXP(25);

  saveGame();
  updateStats();
  showCollection();

  alert("You pulled: " + card);
}

function battleAI(){

  let win = Math.random() > 0.5;

  if(win){
    coins = Number(coins) + 100;
    gainXP(50);
    alert("You beat the AI!");
  } else {
    coins = Number(coins) + 25;
    gainXP(15);
    alert("You lost!");
  }

  saveGame();
  updateStats();
}

updateStats();
showCollection();

</script>

</body>
</html>
